<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>Eid Photo Generator · Chuti group</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Cinzel: premium serif for headings | Inter: clean sans for body -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet" crossorigin="anonymous">
</head>
<body>

  <!-- Ambient background glows -->
  <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--2" aria-hidden="true"></div>

  <div class="page-wrapper">
    <main class="card" role="main">

      <!-- ── Header ── -->
      <header class="card-header">
        <img src="assets/logo.png" alt="Chuti group Logo" class="logo"
             onerror="this.style.display='none'">
        <p class="eyebrow">Eid Photo Generator</p>
        <h1 class="card-title">Eid Mubarak</h1>
        <p class="card-subtitle">from <strong>Chuti group</strong></p>
        <div class="title-divider" aria-hidden="true"></div>
      </header>

      <!-- ── Step 1: Name ── -->
      <section class="step-section">
        <div class="step-num" aria-hidden="true">1</div>
        <div class="step-body">
          <label for="employeeName" class="step-label">Your Name</label>
          <p class="step-hint">Will appear on your Eid photo</p>
          <input
            type="text"
            id="employeeName"
            class="text-input"
            placeholder="e.g. Md. Al Abid"
            maxlength="40"
            autocomplete="name"
          />
        </div>
      </section>

      <!-- ── Step 2: Upload photo ── -->
      <section class="step-section">
        <div class="step-num" aria-hidden="true">2</div>
        <div class="step-body">
          <label for="photoInput" class="step-label">Upload Your Photo</label>
          <p class="step-hint">JPG · PNG · WEBP — up to 10 MB</p>

          <!-- Drag-and-drop upload zone -->
          <div class="upload-zone" id="uploadZone" role="button" tabindex="0"
               aria-label="Click or drag to upload your photo">
            <div class="upload-icon" id="uploadIcon" aria-hidden="true">
              <!-- Camera / image icon -->
              <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.4">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                <circle cx="12" cy="13" r="3"/>
              </svg>
            </div>
            <p class="upload-main">Drop photo here or <span class="upload-cta">browse</span></p>
            <p class="upload-sub" id="uploadSub">Best results with a portrait / face photo</p>
            <!-- Hidden real file input – the whole zone is clickable via label -->
            <input type="file" id="photoInput" accept="image/*" tabindex="-1" />
          </div>

        </div>
      </section>

      <!-- ── Preview canvas ── -->
      <section class="preview-section" aria-label="Generated photo preview">
        <div class="preview-wrap" id="previewWrap">

          <!-- Placeholder while template loads -->
          <div class="preview-placeholder" id="previewPlaceholder">
            <span class="preview-placeholder-text">Loading template…</span>
          </div>

          <canvas id="previewCanvas" width="1080" height="1080"
                  aria-label="Preview of your Eid photo" hidden></canvas>

          <!-- Success overlay -->
          <div class="preview-success" id="previewSuccess" hidden aria-live="polite">
            <svg class="success-check" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.2" aria-hidden="true">
              <circle cx="12" cy="12" r="10" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 12.5l2.5 2.5 5-5"/>
            </svg>
            <p>Photo generated successfully!</p>
          </div>
        </div>
      </section>

      <!-- ── Download ── -->
      <div class="actions">
        <button type="button" id="downloadBtn" class="btn btn-primary" disabled>
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5 5-5M12 4v11"/>
          </svg>
          Download Photo
        </button>
      </div>

      <!-- ── Help ── -->
      <p class="help-line">
        সমস্যা হলে
        <a href="https://wa.me/8801335113405" target="_blank" rel="noopener" class="help-wa">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          WhatsApp করুন: 01335-113405
        </a>
      </p>

    </main>
  </div>

    <!-- Preload the template image so canvas can use it -->
    <img src="assets/EidT.png" id="templateAsset" alt="" crossorigin="anonymous"
      style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;left:-9999px;">

  <div class="copy-toast" id="copyToast" aria-live="polite" hidden>নম্বর কপি হয়েছে!</div>
  <script src="script.js"></script>
</body>
</html>
